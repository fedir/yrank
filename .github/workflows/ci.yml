name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Functional smoke test (offline, no API quota)
        run: ./yrank -top-search "fitness" -local-test -o csv | head -3
